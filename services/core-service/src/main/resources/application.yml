spring:
  application:
    name: core-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/arena_core}
    username: ${DB_USERNAME:arena}
    password: ${DB_PASSWORD:arena}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${AUTH_JWKS_URI:http://localhost:8081/oauth2/jwks}

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
